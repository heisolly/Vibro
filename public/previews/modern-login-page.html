<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Login Page Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        min-height: 100vh;
      }
      .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      input:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5);
      }
      .float {
        animation: float 6s ease-in-out infinite;
      }
      .float-delay {
        animation: float 6s ease-in-out 2s infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      .gradient-orb {
        filter: blur(80px);
      }
    </style>
  </head>
  <body
    class="bg-gray-950 text-white flex items-center justify-center min-h-screen relative overflow-hidden"
  >
    <!-- Background orbs -->
    <div
      class="absolute top-1/4 -left-20 w-72 h-72 bg-indigo-600/30 rounded-full gradient-orb float"
    ></div>
    <div
      class="absolute bottom-1/4 -right-20 w-96 h-96 bg-purple-600/20 rounded-full gradient-orb float-delay"
    ></div>
    <div
      class="absolute top-10 right-1/4 w-48 h-48 bg-pink-600/20 rounded-full gradient-orb float"
    ></div>

    <div class="relative z-10 w-full max-w-md mx-4">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4 shadow-lg shadow-indigo-500/30"
        >
          <svg
            class="w-7 h-7 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
        </div>
        <h1 class="text-2xl font-bold">Welcome back</h1>
        <p class="text-gray-400 text-sm mt-1">
          Sign in to your account to continue
        </p>
      </div>

      <!-- Card -->
      <div class="glass rounded-3xl p-8">
        <!-- Social buttons -->
        <div class="grid grid-cols-2 gap-3 mb-6">
          <button
            class="flex items-center justify-center gap-2 py-3 rounded-xl bg-white/5 border border-white/10 text-sm font-medium hover:bg-white/10 transition"
          >
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path
                fill="currentColor"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Google
          </button>
          <button
            class="flex items-center justify-center gap-2 py-3 rounded-xl bg-white/5 border border-white/10 text-sm font-medium hover:bg-white/10 transition"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              />
            </svg>
            GitHub
          </button>
        </div>

        <!-- Divider -->
        <div class="flex items-center gap-4 mb-6">
          <div class="flex-1 h-px bg-white/10"></div>
          <span class="text-xs text-gray-500">or continue with email</span>
          <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <!-- Form -->
        <form onsubmit="handleLogin(event)">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-1.5"
                >Email address</label
              >
              <input
                type="email"
                id="email"
                placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-500 transition hover:border-white/20"
              />
            </div>
            <div>
              <div class="flex items-center justify-between mb-1.5">
                <label class="block text-sm font-medium text-gray-300"
                  >Password</label
                >
                <a
                  href="#"
                  class="text-xs text-indigo-400 hover:text-indigo-300 transition"
                  >Forgot password?</a
                >
              </div>
              <div class="relative">
                <input
                  type="password"
                  id="password"
                  placeholder="••••••••"
                  class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-gray-500 transition hover:border-white/20 pr-12"
                />
                <button
                  type="button"
                  onclick="togglePassword()"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition"
                >
                  <svg
                    id="eyeIcon"
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <input
                type="checkbox"
                id="remember"
                class="w-4 h-4 rounded bg-white/5 border-white/20 text-indigo-600 focus:ring-indigo-500 cursor-pointer"
              />
              <label for="remember" class="text-sm text-gray-400 cursor-pointer"
                >Remember me for 30 days</label
              >
            </div>
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full mt-6 py-3.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold hover:from-indigo-500 hover:to-purple-500 transition-all shadow-lg shadow-indigo-500/25 active:scale-[0.98]"
          >
            Sign in
          </button>
        </form>

        <!-- Success message -->
        <div
          id="successMsg"
          class="hidden mt-4 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-center"
        >
          <svg
            class="w-8 h-8 mx-auto text-emerald-400 mb-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <p class="text-emerald-400 font-medium text-sm">
            Successfully signed in!
          </p>
        </div>
      </div>

      <!-- Signup link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a
          href="#"
          class="text-indigo-400 font-medium hover:text-indigo-300 transition"
          >Sign up for free</a
        >
      </p>
    </div>

    <script>
      function togglePassword() {
        const pw = document.getElementById("password");
        pw.type = pw.type === "password" ? "text" : "password";
      }

      function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById("loginBtn");
        btn.textContent = "Signing in...";
        btn.disabled = true;
        btn.classList.add("opacity-70");

        setTimeout(() => {
          btn.textContent = "Sign in";
          btn.disabled = false;
          btn.classList.remove("opacity-70");
          document.getElementById("successMsg").classList.remove("hidden");
          setTimeout(
            () => document.getElementById("successMsg").classList.add("hidden"),
            3000,
          );
        }, 1500);
      }
    </script>
  </body>
</html>
